app-id: org.droposs.client
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
- org.freedesktop.Sdk.Extension.node22
command: drop-app
finish-args:
- --socket=wayland
- --socket=fallback-x11
- --socket=session-dbus
- --share=network
- --filesystem=xdg-download
- --talk-name=org.freedesktop.Notifications
cleanup:
- /include
- /lib/pkgconfig
- /share/gtk-doc
- '*.la'
- '*.a'
modules:
- name: drop-app-bootstrap
  buildsystem: simple
  build-options:
    append-path: /usr/lib/sdk/node22/bin
    env:
      LD_LIBRARY_PATH: /app/lib/rust-nightly/lib
  sources:
  - type: git
    url: https://github.com/Drop-OSS/drop-app
    commit: c9ceb3f50ea061f0023f87211775e8380a181cbc
    disable-shallow-clone: true
  - type: shell
    commands:
    - git submodule update --init --recursive
  - type: archive
    url: https://static.rust-lang.org/dist/rustc-nightly-x86_64-unknown-linux-gnu.tar.xz
    sha256: 6e280cf8889524b092214f9ed7c293bee43680988b00cc48cdac76c9df352c1d
    strip-components: 1
    dest: rust-nightly/rustc
  - type: archive
    url: https://static.rust-lang.org/dist/cargo-nightly-x86_64-unknown-linux-gnu.tar.xz
    sha256: c5421d7fad5e5c3596ba6c0748e4441a87deb237a56e1ef7c1551c0dc93dd3cd
    strip-components: 1
    dest: rust-nightly/cargo
  - type: archive
    url: https://static.rust-lang.org/dist/rust-std-nightly-x86_64-unknown-linux-gnu.tar.xz
    sha256: d590f515075c54918d48cb16c77677633b5a5245e4055655fdc82c1ab7983f13
    strip-components: 1
    dest: rust-nightly/rust-std
  - type: file
    url: https://github.com/pnpm/pnpm/releases/download/v11.3.0/pnpm-linux-x64.tar.gz
    sha256: 6eb506b53297eb1186ba0cbff1577bb26d17713835a01a5342dcafae550827ce
    dest-filename: pnpm-linux-x64.tar.gz
    dest: flatpak-node/pnpm-vendor
  build-commands:
  - mkdir -p /app/lib/rust-nightly/{bin,lib} /app/bin
  - cp -r rust-nightly/rustc/rustc/bin/* /app/lib/rust-nightly/bin/
  - cp -r rust-nightly/rustc/rustc/lib/* /app/lib/rust-nightly/lib/
  - cp -r rust-nightly/cargo/cargo/bin/* /app/lib/rust-nightly/bin/
  - cp -r rust-nightly/cargo/cargo/share /app/lib/rust-nightly/share/
  - cp -r rust-nightly/rust-std/rust-std-x86_64-unknown-linux-gnu/lib/rustlib/. /app/lib/rust-nightly/lib/rustlib/
  - tar xzf flatpak-node/pnpm-vendor/pnpm-linux-x64.tar.gz -C /app/bin/ && chmod +x /app/bin/pnpm
  - LD_LIBRARY_PATH=/app/lib/rust-nightly/lib /app/lib/rust-nightly/bin/rustc --version
  - /app/bin/pnpm --version
- name: drop-app-nuxt
  buildsystem: simple
  build-options:
    append-path: /usr/lib/sdk/node22/bin:/app/bin
    env:
      CI: 'true'
  sources:
