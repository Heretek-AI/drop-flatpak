      replace-with = "vendored-sources"


      [source."https://github.com/drop-oss/native_model"]

      git = "https://github.com/drop-oss/native_model"

      replace-with = "vendored-sources"

      '
    dest: cargo
    dest-filename: config
  build-commands:
  - mkdir -p .cargo
  - echo "[source.crates-io]" > .cargo/config.toml
  - echo "replace-with = \"vendored-sources\"" >> .cargo/config.toml
  - echo "[source.vendored-sources]" >> .cargo/config.toml
  - echo "directory = \"cargo/vendor\"" >> .cargo/config.toml
  - echo '' >> .cargo/config.toml
  - echo '[patch."https://github.com/Drop-OSS/droplet-rs"]' >> .cargo/config.toml
  - echo 'droplet-rs = { path = "cargo/vendor/droplet-rs" }' >> .cargo/config.toml
  - echo '[patch."https://github.com/Drop-OSS/native_model"]' >> .cargo/config.toml
  - echo 'native_model = { path = "cargo/vendor/native_model" }' >> .cargo/config.toml
  - cargo build --manifest-path src-tauri/Cargo.toml --release
  - install -Dm755 src-tauri/target/release/drop-app /app/bin/drop-app
  - for size in 32x32 128x128 "128x128@2x"; do install -Dm644 "src-tauri/icons/${size}.png" "/app/share/icons/hicolor/${size}/apps/org.droposs.client.png";
    done
  - install -Dm644 org.droposs.client.desktop /app/share/applications/org.droposs.client.desktop
  - install -Dm644 org.droposs.client.metainfo.xml /app/share/metainfo/org.droposs.client.metainfo.xml
