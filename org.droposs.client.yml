    \  sharp@<0.32.6: '>=0.32.6'\n  tmp@<=0.2.3: '>=0.2.4'\n  tough-cookie@<4.1.3: '>=4.1.3'\n  trim-newlines@<3.0.1: '>=3.0.1'\nPNPMWSEOF\n"
  - /app/bin/pnpm install --offline --frozen-lockfile --no-verify-store --store-dir flatpak-node/pnpm-store
  - echo "store-dir=../flatpak-node-main/pnpm-store" >> main/.npmrc && echo "fetch-retries=0" >> main/.npmrc && echo "prefer-offline=true" >>
