    dest-filename: pnpm-manifest.json
    dest: flatpak-node-main
  - type: script
    commands:
    - version=$(node --version | sed "s/^v//")
    - nodedir=$(dirname "$(dirname "$(which node)")")
    - mkdir -p "flatpak-node-main/cache/node-gyp/$version"
    - ln -s "$nodedir/include" "flatpak-node-main/cache/node-gyp/$version/include"
    - echo 11 > "flatpak-node-main/cache/node-gyp/$version/installVersion"
    dest-filename: setup_sdk_node_headers.sh
    dest: flatpak-node-main
  - type: shell
    commands:
    - mkdir -p "bin/@esbuild"
    - cp ".package/@esbuild/linux-arm64@0.25.12/bin/esbuild" "bin/@esbuild/linux-arm64@0.25.12"
    - ln -sf "@esbuild/linux-arm64@0.25.12" "bin/esbuild-current"
    dest: flatpak-node-main/cache/esbuild
    only-arches:
    - aarch64
  - type: shell
    commands:
    - mkdir -p "bin/@esbuild"
    - cp ".package/@esbuild/linux-arm@0.25.12/bin/esbuild" "bin/@esbuild/linux-arm@0.25.12"
    - ln -sf "@esbuild/linux-arm@0.25.12" "bin/esbuild-current"
    dest: flatpak-node-main/cache/esbuild
    only-arches:
    - arm
  - type: shell
    commands:
    - mkdir -p "bin/@esbuild"
    - cp ".package/@esbuild/linux-ia32@0.25.12/bin/esbuild" "bin/@esbuild/linux-ia32@0.25.12"
    - ln -sf "@esbuild/linux-ia32@0.25.12" "bin/esbuild-current"
    dest: flatpak-node-main/cache/esbuild
    only-arches:
    - i386
  - type: shell
    commands:
    - mkdir -p "bin/@esbuild"
    - cp ".package/@esbuild/linux-x64@0.25.12/bin/esbuild" "bin/@esbuild/linux-x64@0.25.12"
    - ln -sf "@esbuild/linux-x64@0.25.12" "bin/esbuild-current"
    dest: flatpak-node-main/cache/esbuild
    only-arches:
    - x86_64
  - type: shell
    commands:
    - python3 flatpak-node-main/populate_pnpm_store.py flatpak-node-main/pnpm-manifest.json flatpak-node-main/pnpm-tarballs flatpak-node-main/pnpm-store
    - echo "store-dir=$PWD/flatpak-node-main/pnpm-store" >> .npmrc
    - bash flatpak-node-main/setup_sdk_node_headers.sh
  build-commands:
  - echo "fetch-retries=0" >> .npmrc && echo "fetch-timeout=1" >> .npmrc && echo "prefer-offline=true" >> .npmrc
  - python3 -c "import json; m=json.load(open('flatpak-node/pnpm-manifest.json')); m['store_version']='v11'; json.dump(m, open('flatpak-node/pnpm-manifest.json','w'))"
  - python3 flatpak-node/populate_pnpm_store.py flatpak-node/pnpm-manifest.json flatpak-node/pnpm-tarballs flatpak-node/pnpm-store && echo "store-dir=$PWD/flatpak-node/pnpm-store"
    >> .npmrc && bash flatpak-node/setup_sdk_node_headers.sh
